<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>path-binder — Redirecting…</title>
  <script>
    // Detect browser language and redirect to the appropriate docs.
    // Default to English if detection fails or language is unsupported.
    var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    var target = lang.startsWith('ja') ? 'ja/' : 'en/';
    window.location.replace(target);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=en/">
  </noscript>
</head>
<body>
  <p>Redirecting… <a href="en/">English</a> | <a href="ja/">日本語</a></p>
</body>
</html>
